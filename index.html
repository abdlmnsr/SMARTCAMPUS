<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masoem Future - Nasir</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    
    <!-- Library -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* Variabel Dasar (Light Mode - Putih) */
        :root {
            --bg: #ffffff;
            --surface: #f5f5f7;
            --surface-card: rgba(255, 255, 255, 0.8);
            --text-main: #000000;
            --text-dim: #666666;
            --accent: #FF5C00;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            --shadow: rgba(0, 0, 0, 0.05);
        }

        /* Variabel Dark Mode (Hitam) */
        [data-theme="dark"] {
            --bg: #000000;
            --surface: #1A1A1A;
            --surface-card: #121212;
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
            --nav-bg: rgba(20, 20, 20, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            transition: background 0.3s, color 0.3s;
        }

        body { 
            background: var(--bg);
            display: flex; justify-content: center; 
            height: 100vh; overflow: hidden;
            color: var(--text-main);
        }

        #app {
            width: 100%; max-width: 480px; height: 100%;
            position: relative; display: flex; flex-direction: column;
        }

        #content-area {
            flex: 1; overflow-y: auto;
            padding: 30px 20px; padding-bottom: 120px;
            scrollbar-width: none;
        }
        #content-area::-webkit-scrollbar { display: none; }

        /* Typography */
        h1, h2 { font-weight: 800; font-size: 32px; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 20px; }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 600; }
        .text-accent { color: var(--accent); }

        /* Cards */
        .card {
            background: var(--surface-card);
            backdrop-filter: blur(10px);
            border-radius: 28px; padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 20px var(--shadow);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buttons & Inputs */
        .btn-premium {
            background: var(--text-main);
            color: var(--bg);
            border: none; border-radius: 50px; padding: 18px;
            font-weight: 600; cursor: pointer;
            width: 100%; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-premium:active { transform: scale(0.96); }

        input {
            width: 100%; padding: 18px; margin: 10px 0;
            background: var(--surface); border: 1px solid transparent;
            border-radius: 18px; color: var(--text-main); outline: none;
        }
        input:focus { border-color: var(--accent); }

        /* Bottom Nav */
        #bottom-nav {
            position: absolute; bottom: 25px; left: 20px; right: 20px;
            height: 70px; background: var(--nav-bg);
            backdrop-filter: blur(15px); border-radius: 25px;
            display: none; justify-content: space-around; align-items: center;
            border: 1px solid var(--border);
            box-shadow: 0 15px 30px var(--shadow);
        }

        .nav-item { text-align: center; color: var(--text-dim); cursor: pointer; font-size: 10px; font-weight: 600; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }

        /* Floating Action Button (Mode Toggle) */
        .fab {
            position: absolute; top: 30px; right: 20px;
            width: 45px; height: 45px; background: var(--surface);
            border-radius: 50%; display: none; justify-content: center;
            align-items: center; border: 1px solid var(--border);
            z-index: 100; cursor: pointer; font-size: 18px;
        }

        #reader { border-radius: 24px; overflow: hidden; margin-top: 15px; background: var(--surface); }

        .status-pill {
            display: inline-block; padding: 6px 12px; 
            background: rgba(255, 92, 0, 0.1); color: var(--accent);
            border-radius: 50px; font-size: 11px; font-weight: 700;
            margin-bottom: 10px; text-transform: uppercase;
        }
    </style>
</head>
<body>

            <div class="nav-item" data-page="profil"><i>👤</i>Me</div>
        </nav>
    </div>

    <script>

            const current = document.documentElement.getAttribute('data-theme');

            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
        }

        // Cek preferensi tersimpan atau sistem
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);

        const pages = {

                        <b>SIA</b>

                    </div>

                </div>

                    <div style="display:flex; justify-content:space-between">
                        <b>INSTALASI KOMPUTER</b>

                    <div style="display:flex; justify-content:space-between">

                <div style="display:flex; align-items:center; gap:15px">
                    <input type="checkbox" class="task-check" disabled>
                    <div>
                        <b style="font-size:14px">Implementasi Jurnal Digital</b>

                    </div>
                </div>
                <button class="btn-confirm" onclick="markTaskComplete('task2')" style="background:var(--accent); color:white; border:none; padding:8px 12px; border-radius:12px; font-size:11px; cursor:pointer; font-weight:600;">Selesaikan</button>

    <div class="card" style="border-style: dashed; background: transparent; text-align: center; padding: 20px;" onclick="resetTasks()">

`,

                <div id="github-container"></div>

            scanner: `

        };

        // Fungsi untuk menandai tugas selesai
function markTaskComplete(taskId) {
    // 1. Simpan ke LocalStorage
    localStorage.setItem(taskId, 'completed');
    
    // 2. Beri feedback visual
    updateTaskUI(taskId);
    
    // 3. Tampilkan Notifikasi
    showToast("Misi Berhasil Diselesaikan! 🎉");
}

// Fungsi untuk memperbarui tampilan UI tugas
function updateTaskUI(taskId) {
    const $taskCard = $(`.task-item[data-task-id="${taskId}"]`);
    if (localStorage.getItem(taskId) === 'completed') {
        $taskCard.css('opacity', '0.5');
        $taskCard.find('.task-check').prop('checked', true);
        $taskCard.find('.btn-confirm').text('Selesai').css('background', '#22C55E').prop('disabled', true);
        $taskCard.find('b').css('text-decoration', 'line-through');
    }
}

// Fungsi ini harus dipanggil setiap kali halaman tugas dibuka
function loadTaskStates() {
    $('.task-item').each(function() {
        const id = $(this).data('task-id');
        updateTaskUI(id);
    });
}

// Fungsi untuk mereset (untuk testing)
function resetTasks() {
    localStorage.removeItem('task1');
    localStorage.removeItem('task2');
    navigateTo('tugas');
    showToast("Misi telah di-reset.");
}

        function showToast(msg) { $('#toast').text(msg).fadeIn().delay(2000).fadeOut(); }
        function doLogin() { navigateTo('dashboard'); }

        async function fetchGithubData() {
            try {
                const res = await fetch('https://api.github.com/users/abdlmnsr');
                const data = await res.json();
                $('#github-container').html(`
                    <div class="card" style="display:flex; align-items:center; gap:20px">
                        <img src="${data.avatar_url}" style="width:60px; border-radius:18px">
                        <div>
                            <h4 style="margin:0">@abdlmnsr</h4>
                            <p style="color:var(--text-dim); font-size:12px">${data.public_repos} Repositories</p>
                        </div>
                    </div>
                `);
            } catch (e) {}
        }

        function getLocation() {
            if (navigator.geolocation) {
                $('#geo-status').text("Syncing...");
                navigator.geolocation.getCurrentPosition((pos) => {
                    $('#geo-status').html(`Verified: <span style="color:var(--text-main)">${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}</span>`);
                });
            }
        }

        function navigateTo(key) {
            $('#content-area').fadeOut(150, function() {
                $(this).html(pages[key]).fadeIn(150);
                if(key === 'tugas') loadTaskStates();
                if(key === 'github') fetchGithubData();
                if(key === 'scanner') {
                    const qr = new Html5Qrcode("reader");
                    qr.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                        showToast("Scan Success");
                        qr.stop();
                    }).catch(() => {});
                }
            });
            
            if(key === 'splash' || key === 'login') {
                $('#bottom-nav, .fab').hide();
            } else {
                $('#bottom-nav').css('display', 'flex');
                $('.fab').show();
            }
            $('.nav-item').removeClass('active');
            $(`[data-page="${key}"]`).addClass('active');
        }

        $(document).ready(function() {
            navigateTo('splash');
            setTimeout(() => navigateTo('login'), 2500);
            $('.nav-item').on('click', function() { navigateTo($(this).data('page')); });
        });
    </script>
</body>
</html>
